<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Tsu ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink: #e8e2d9;
    --ink-muted: rgba(232,226,217,0.45);
    --ink-faint: rgba(232,226,217,0.18);
    --rose: #c9a0a0;
    --rose-glow: rgba(201,160,160,0.12);
    --gold: #c8b08a;
    --gold-faint: rgba(200,176,138,0.08);
  }

  body {
    background: #0c0a0f;
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 180px;
    opacity: 0.55;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Ambient glow blobs ── */
  .blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(80px);
    z-index: 0;
  }
  .blob-1 { width: 420px; height: 420px; background: rgba(100,60,90,0.25); top: -80px; right: -80px; }
  .blob-2 { width: 300px; height: 300px; background: rgba(60,50,100,0.2); bottom: 0; left: -60px; }
  .blob-3 { width: 200px; height: 200px; background: rgba(140,90,80,0.12); top: 50%; left: 50%; transform: translate(-50%,-50%); }

  /* ── Canvas stars ── */
  canvas#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  /* ── Layout ── */
  #app {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1.5rem;
    gap: 0;
  }

  /* ── Eyebrow ── */
  .eyebrow {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.7;
    margin-bottom: 1.4rem;
  }

  /* ── Main heading ── */
  .heading {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 7vw, 4.2rem);
    line-height: 1.1;
    text-align: center;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }
  .heading em {
    font-style: italic;
    color: var(--rose);
  }

  /* ── Sub ── */
  .subtext {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    color: var(--ink-muted);
    text-align: center;
    max-width: 480px;
    line-height: 1.75;
    margin-bottom: 3.5rem;
  }

  /* ── Divider ── */
  .divider {
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, transparent, var(--rose), transparent);
    margin: 0 auto 3.5rem;
    opacity: 0.5;
  }

  /* ── Countdown ── */
  .countdown {
    display: flex;
    gap: clamp(1rem, 4vw, 2.5rem);
    align-items: flex-start;
    margin-bottom: 4rem;
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .unit-sep {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.8rem;
    color: var(--ink-faint);
    padding-top: 0.2rem;
    line-height: 1;
    user-select: none;
  }

  .num-wrap {
    position: relative;
    width: clamp(56px, 14vw, 76px);
    height: clamp(64px, 15vw, 86px);
  }

  .num-border {
    position: absolute;
    inset: 0;
    border: 1px solid var(--rose);
    opacity: 0.2;
    border-radius: 4px;
  }
  .num-border::before {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid var(--gold);
    opacity: 0.35;
    border-radius: 2px;
  }

  .num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    color: var(--ink);
    letter-spacing: 0.05em;
    transition: opacity 0.15s;
  }

  .lbl {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  /* ── Message line ── */
  .message {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.9rem, 2.5vw, 1.05rem);
    color: var(--ink-muted);
    text-align: center;
    max-width: 420px;
    line-height: 1.9;
    margin-bottom: 3rem;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 1.2s 0.6s ease forwards;
  }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Music button ── */
  .music-btn {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    background: none;
    border: 1px solid var(--ink-faint);
    color: var(--ink-muted);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.65rem 1.4rem;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
    position: relative;
    overflow: hidden;
  }
  .music-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--rose-glow);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .music-btn:hover { border-color: var(--rose); color: var(--rose); }
  .music-btn:hover::after { opacity: 1; }

  .music-icon {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .bar {
    width: 2px;
    background: currentColor;
    border-radius: 1px;
    animation: eq 1.2s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 10px; animation-delay: 0.2s; }
  .bar:nth-child(3) { height: 7px; animation-delay: 0.4s; }
  .bar:nth-child(4) { height: 4px; animation-delay: 0.1s; }
  @keyframes eq {
    from { transform: scaleY(0.3); }
    to   { transform: scaleY(1.3); }
  }
  .music-btn.paused .bar { animation-play-state: paused; }

  /* ── Footer ── */
  .footer {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    white-space: nowrap;
    z-index: 2;
  }
</style>
</head>
<body>
<audio id="bg-music" loop><source src="./audio/musica.mp3" type="audio/mpeg"></audio>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<canvas id="stars"></canvas>

<div id="app">
  <p class="eyebrow">Para Tsu &nbsp;·&nbsp; siempre</p>

  <h1 class="heading">Algo <em>especial</em><br>está cerca</h1>

  <div class="divider"></div>

  <p class="subtext">La distancia no cambia lo que sientes.<br>Algunos momentos simplemente <em>tienen que llegar.</em></p>

  <div class="countdown" id="countdown">
    <div class="unit">
      <div class="num-wrap"><div class="num-border"></div><div class="num" id="days">00</div></div>
      <span class="lbl">días</span>
    </div>
    <span class="unit-sep">·</span>
    <div class="unit">
      <div class="num-wrap"><div class="num-border"></div><div class="num" id="hours">00</div></div>
      <span class="lbl">horas</span>
    </div>
    <span class="unit-sep">·</span>
    <div class="unit">
      <div class="num-wrap"><div class="num-border"></div><div class="num" id="mins">00</div></div>
      <span class="lbl">minutos</span>
    </div>
    <span class="unit-sep">·</span>
    <div class="unit">
      <div class="num-wrap"><div class="num-border"></div><div class="num" id="secs">00</div></div>
      <span class="lbl">segundos</span>
    </div>
  </div>

  <p class="message">"No importa cuántas veces cuente los días,<br>siempre termino pensando en ti."</p>

  <button class="music-btn paused" id="music-btn">
    <span class="music-icon">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span><span class="bar"></span>
    </span>
    <span id="music-label">activar música</span>
  </button>
</div>

<div class="footer">© para ti, con todo</div>

<script>
// Stars
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function initStars() {
  stars = [];
  for (let i = 0; i < 180; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 0.9 + 0.2,
      a: Math.random(),
      speed: Math.random() * 0.004 + 0.002,
      phase: Math.random() * Math.PI * 2,
    });
  }
}
initStars();

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    const alpha = 0.15 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,226,217,${alpha.toFixed(3)})`;
    ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);

// Countdown
const target = new Date("2026-06-15T00:00:00-03:00").getTime();
const dEl = document.getElementById('days');
const hEl = document.getElementById('hours');
const mEl = document.getElementById('mins');
const sEl = document.getElementById('secs');

function pad(n) { return n < 10 ? '0' + n : '' + n; }
function setNum(el, val) {
  if (el.textContent !== val) {
    el.style.opacity = '0';
    setTimeout(() => { el.textContent = val; el.style.opacity = '1'; }, 80);
  }
}

function tick() {
  const now = Date.now();
  const dist = target - now;
  if (dist <= 0) {
    clearInterval(timer);
    document.getElementById('app').style.opacity = '0';
    document.getElementById('app').style.transition = 'opacity 1s';
    setTimeout(() => { window.location.href = 'felicidades.html'; }, 900);
    return;
  }
  const d = Math.floor(dist / 86400000);
  const h = Math.floor((dist % 86400000) / 3600000);
  const m = Math.floor((dist % 3600000) / 60000);
  const s = Math.floor((dist % 60000) / 1000);
  setNum(dEl, pad(d));
  setNum(hEl, pad(h));
  setNum(mEl, pad(m));
  setNum(sEl, pad(s));
}
tick();
const timer = setInterval(tick, 1000);

// Music
const audio = document.getElementById('bg-music');
const btn = document.getElementById('music-btn');
const lbl = document.getElementById('music-label');
let playing = false;

btn.addEventListener('click', () => {
  if (playing) {
    audio.pause();
    lbl.textContent = 'activar música';
    btn.classList.add('paused');
  } else {
    audio.play().catch(() => {});
    lbl.textContent = 'pausar música';
    btn.classList.remove('paused');
  }
  playing = !playing;
});
</script>
</body>
</html>
